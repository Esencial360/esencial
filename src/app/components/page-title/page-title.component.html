<div class="page-title montserrat-normal">

  @if (arrowBack) {
    <button (click)="goBack()" class="page-title__back" aria-label="Volver">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
      </svg>
    </button>
  }

  <div class="page-title__content">
    @if (pageTitle) {
      <h1 class="page-title__heading">{{ pageTitle }}</h1>
    }
    @if (pageDescription) {
      <p class="page-title__description">{{ pageDescription }}</p>
    }
    <div class="page-title__rule"></div>
  </div>

</div>
