@if (isMatDialog) {
  <!-- ── MatDialog mode ─────────────────────────────────────────────────
       Material already provides the backdrop + centered overlay container.
       Render ONLY the inner content here — no fixed/inset wrappers. -->
  <div class="relative pt-10 p-8 text-center">
    <!-- Warning icon overflowing above the panel -->
    <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-20 h-20 bg-gradient-to-r from-orange to-red rounded-full flex items-center justify-center shadow-lg">
      <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.268 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
      </svg>
    </div>

    <h2 class="text-2xl font-bold text-strongBrown mb-4">{{ title }}</h2>
    <p class="text-gray-700 mb-8 leading-relaxed">{{ message }}</p>

    <div class="flex justify-center space-x-4">
      <button
        *ngIf="cancelText"
        (click)="cancel()"
        class="w-1/2 bg-white text-gray-700 font-semibold py-3 px-6 rounded-xl border-2 border-gray-200 hover:border-gray-400 shadow-md hover:shadow-lg transform hover:scale-105 transition-all duration-200"
      >{{ cancelText }}</button>

      <button
        (click)="confirm()"
        class="w-1/2 bg-gradient-to-r from-orange to-red text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-200"
      >{{ confirmText || 'Confirmar' }}</button>
    </div>

    <p class="text-xs text-gray-500 italic mt-4">Esta acción no se puede deshacer</p>
  </div>

} @else {
  <!-- ── Inline / @Input mode ───────────────────────────────────────────
       Used as <app-dialog [isOpen]="true" ...> directly in a template.
       Renders its own fixed backdrop + centered panel. -->
  @if (isOpen) {
    <div
      role="dialog"
      aria-modal="true"
      class="fixed inset-0 z-[100002] flex items-center justify-center p-4"
    >
      <div (click)="cancel()" class="fixed inset-0 bg-black/50 backdrop-blur-sm"></div>

      <div class="relative w-full max-w-md bg-gradient-to-br from-white/95 via-gray-50/90 to-white/95 backdrop-blur-lg rounded-3xl p-8 text-center shadow-2xl border border-white/50 mt-10">
        <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-20 h-20 bg-gradient-to-r from-orange to-red rounded-full flex items-center justify-center shadow-lg">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.268 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
          </svg>
        </div>

        <div class="pt-8">
          <h2 class="text-2xl font-bold text-strongBrown mb-4">{{ title }}</h2>
          <p class="text-gray-700 mb-8 leading-relaxed">{{ message }}</p>

          <div class="flex justify-center space-x-4">
            <button
              *ngIf="cancelText"
              (click)="cancel()"
              class="w-1/2 bg-white text-gray-700 font-semibold py-3 px-6 rounded-xl border-2 border-gray-200 hover:border-gray-400 shadow-md hover:shadow-lg transform hover:scale-105 transition-all duration-200"
            >{{ cancelText }}</button>

            <button
              (click)="confirm()"
              class="w-1/2 bg-gradient-to-r from-orange to-red text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-200"
            >{{ confirmText || 'Confirmar' }}</button>
          </div>

          <p class="text-xs text-gray-500 italic mt-4">Esta acción no se puede deshacer</p>
        </div>
      </div>
    </div>
  }
}
