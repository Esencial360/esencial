<div class="content-hero montserrat-normal group">

  <!-- ── Background subtle texture ──────────────────────────────────── -->
  <div class="content-hero__bg" aria-hidden="true">
    <div class="content-hero__bg-orb content-hero__bg-orb--1"></div>
    <div class="content-hero__bg-orb content-hero__bg-orb--2"></div>
  </div>

  <!-- ── Image ────────────────────────────────────────────────────────── -->
  <div class="content-hero__image-col" data-aos="fade-right" data-aos-duration="700">
    <div class="content-hero__image-frame">
      <img
        [src]="image"
        alt="Contenido visual"
        class="content-hero__img"
        loading="lazy"
      />
      <div class="content-hero__img-overlay"></div>
    </div>
  </div>

  <!-- ── Content ──────────────────────────────────────────────────────── -->
  <div class="content-hero__body" data-aos="fade-left" data-aos-duration="700" data-aos-delay="150">

    <!-- Eyebrow -->
    <span class="content-hero__eyebrow">
      <span class="content-hero__eyebrow-dot"></span>
      Destacado
    </span>

    <!-- Title -->
    <h1 class="content-hero__title">{{ title }}</h1>

    <!-- Divider -->
    <div class="content-hero__rule"></div>

    <!-- Description -->
    <p class="content-hero__description">{{ description }}</p>

    <!-- Closing title -->
    @if (closingTitle) {
      <div class="content-hero__closing">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-4 h-4 shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
        </svg>
        {{ closingTitle }}
      </div>
    }

    <!-- Explore link -->
    <div class="content-hero__cta">
      <span>Explorar contenido</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 content-hero__cta-arrow">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/>
      </svg>
    </div>

  </div>
</div>
